name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cowork
          POSTGRES_PASSWORD: cowork
          POSTGRES_DB: cowork_service_desk
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://cowork:cowork@localhost:5432/cowork_service_desk?schema=public
          REDIS_URL: redis://localhost:6379/0
          JWT_ACCESS_SECRET: 0123456789012345678901234567890123456789012345678901234567891234
          JWT_REFRESH_SECRET: 0123456789012345678901234567890123456789012345678901234567891234
          COOKIE_SECRET: 0123456789012345678901234567890123456789012345678901234567891234
