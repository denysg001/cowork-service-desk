name: ci
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cowork
          POSTGRES_PASSWORD: cowork
          POSTGRES_DB: cowork_service_desk
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Prisma generate
        run: pnpm --filter @cowork/api prisma:generate
      - name: Build shared package
        run: pnpm --filter @cowork/shared build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Docker build API
        run: docker build -f apps/api/Dockerfile .
      - name: Docker build worker
        run: docker build -f apps/worker/Dockerfile .
      - name: Docker build web
        run: docker build -f apps/web/Dockerfile .
      - name: Security basic
        run: |
          ! grep -R "origin: '*'" apps infra || true
          ! grep -R "localStorage.*refresh" apps || true
      - name: Docs
        run: test -f README.md && test -f SECURITY.md && test -f docs/testsprite.md
        env:
          DATABASE_URL: postgresql://cowork:cowork@localhost:5432/cowork_service_desk?schema=public
          REDIS_URL: redis://localhost:6379/0
          JWT_ACCESS_SECRET: 0123456789012345678901234567890123456789012345678901234567891234
          JWT_REFRESH_SECRET: 0123456789012345678901234567890123456789012345678901234567891234
          COOKIE_SECRET: 0123456789012345678901234567890123456789012345678901234567891234
