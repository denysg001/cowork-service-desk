name: pr-title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commit PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|refactor|test|ci|chore|perf|security|infra)(\([a-z0-9-]+\))?!?: .+'
          if [[ ! "$TITLE" =~ $pattern ]]; then
            echo "PR title must follow Conventional Commits, for example: feat(tickets): add SLA warnings"
            exit 1
          fi
